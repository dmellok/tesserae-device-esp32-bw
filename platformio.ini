; PlatformIO Project Configuration File -- tesserae-esp32-bw-client
;
; Target hardware: generic ESP32 dev board + Waveshare 4.2" e-paper module.
;   - Board:  "ESP-32S Type C, CP2102" Arduino-style breakout.
;             Original ESP32 (Xtensa LX6 dual-core), CP2102 USB-UART
;             (NOT native USB-JTAG), 4 MB flash, NO PSRAM.
;   - Panel:  Waveshare 4.2" e-paper, 400x300 1-bpp B/W (SSD1683 / UC8176).
;             https://www.waveshare.com/4.2inch-e-paper-module.htm
;
; This is the 4.2"/1-bpp sibling of tesserae-esp32-bin-client (13.3" 6-color).
; Everything but the panel driver, the pinout/panel constants, and the
; heartbeat `kind` is shared 1:1 with that firmware.

[env:tesserae-esp32-bw-client]
platform = espressif32
board = esp32dev
framework = espidf

; FW_VERSION is reported in the status heartbeat. Bump on every release.
build_flags =
    -DFW_VERSION=\"0.1.0\"

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, direct

board_build.partitions = partitions.csv
board_build.flash_size = 4MB

; sdkconfig.defaults at the project root is picked up automatically by the
; ESP-IDF integration; no extra path needed here.
